<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Terry Djony</title>
<style>
  :root {
    --bg: #000910;
    --green: #33ff00;
    --green-dim: rgba(51, 255, 0, .6);
  }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--green);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    min-height: 100%;
    /* Allow vertical scrolling so the link grid is reachable on short
       viewports, but never horizontal (matrix bg is position:fixed and
       handles its own viewport). */
    overflow-x: hidden;
    overflow-y: auto;
  }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; min-height: 100vh; }
  /* When the dialog has finished and the link grid is revealed, cap the
     canvas wrap so all 6 links fit below the fold on mobile without
     scrolling. */
  body.show-links #wrap { flex: 0 0 auto; height: 55vh; max-height: 55vh; }
  body.show-links #hint { display: none; }
  #matrix-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
  }
  /* Scanline overlay, matching the original site */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,.18) 50%);
    background-size: 100% 2px;
    z-index: 3;
    mix-blend-mode: overlay;
  }
  #wrap {
    position: relative;
    z-index: 1;
    width: 100vw;
    max-width: 100vw;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    /* Let kaplay manage canvas dimensions via its internal `letterbox`
       config. Forcing object-fit:contain at the CSS layer breaks pointer
       coordinate translation — kaplay assumes the canvas pixels map 1:1
       to the bounding rect, but object-fit injects margins the engine
       doesn't know about, so clicks land at wrong internal coords. */
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    touch-action: manipulation;
  }
  #hint {
    position: relative;
    z-index: 2;
    font-size: 12px;
    color: var(--green-dim);
    padding: 6px 12px;
    text-align: center;
    text-shadow: 0 0 5px var(--green);
  }
  /* HTML link grid — rendered outside the kaplay canvas so taps register
     natively (no canvas-coordinate translation). Hidden until the VN
     finishes its dialog and calls showLinks(). */
  #link-grid {
    position: relative;
    z-index: 2;
    display: none;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px 14px 18px;
    max-width: 480px;
    width: 100%;
    box-sizing: border-box;
  }
  #link-grid.show { display: grid; }
  #link-grid a {
    display: block;
    text-align: center;
    padding: 14px 8px;
    background: var(--bg);
    border: 2px solid var(--green);
    border-radius: 8px;
    color: var(--green);
    text-decoration: none;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 16px;
    letter-spacing: 0.02em;
    text-shadow: 0 0 5px var(--green);
    -webkit-tap-highlight-color: rgba(51, 255, 0, 0.2);
  }
  #link-grid a:active { background: rgba(51, 255, 0, 0.15); }
</style>
</head>
<body>
  <canvas id="matrix-bg"></canvas>
  <div id="wrap"></div>
  <div id="hint">Tap to advance · last frame reveals links</div>
  <nav id="link-grid">
    <a href="https://blog.terrydjony.com"                                           target="_blank" rel="noopener">blog</a>
    <a href="https://github.com/terryds"                                            target="_blank" rel="noopener">github</a>
    <a href="https://x.com/terry_djony"                                             target="_blank" rel="noopener">twitter</a>
    <a href="mailto:hi@terrydjony.com">email</a>
    <a href="https://www.ycombinator.com/verify/jyj7tw4iclddid3l"                   target="_blank" rel="noopener">yc</a>
    <a href="https://news.ycombinator.com/submitted?id=terryds"                     target="_blank" rel="noopener">hackernews</a>
  </nav>

  <!-- Cyberpunk cityscape background ─────────────────────────────────
       Three parallax layers of silhouetted buildings scrolling slowly,
       with flickering matrix-green windows. Drawn on a separate full-
       viewport canvas behind the (transparent) kaplay canvas. -->
  <script>
    (function cityscape() {
      const cv = document.getElementById("matrix-bg");
      const ctx = cv.getContext("2d");

      // Layer config: 3 parallax layers. Building silhouettes are
      // near-black so they pop against the cozy night-sky gradient.
      // Each layer has its own height range, window opacity, and
      // window-color mix (warm yellows in front, green deeper).
      const LAYERS = [
        { speed: 0.005, minH: 140, maxH: 240, color: "#020410", windowAlpha: 0.35, warmMix: 0.2 },
        { speed: 0.012, minH: 220, maxH: 360, color: "#01020a", windowAlpha: 0.6,  warmMix: 0.5 },
        { speed: 0.022, minH: 300, maxH: 460, color: "#000005", windowAlpha: 0.9,  warmMix: 0.7 },
      ];

      let buildings = [];
      let stars = [];

      function regen() {
        buildings = [];
        LAYERS.forEach((layer, layerIdx) => {
          let x = 0;
          while (x < cv.width * 2 + 200) {
            const w = 36 + Math.random() * 60;
            const h = layer.minH + Math.random() * (layer.maxH - layer.minH);
            const windows = [];
            const cols = Math.floor((w - 8) / 10);
            const rows = Math.floor((h - 20) / 14);
            for (let r = 0; r < rows; r++) {
              for (let c = 0; c < cols; c++) {
                if (Math.random() < 0.4) {
                  // Mix of warm yellow + green windows for cozy night feel
                  const warm = Math.random() < layer.warmMix;
                  windows.push({
                    x: 4 + c * 10,
                    y: 10 + r * 14,
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.4 + Math.random() * 2,
                    warm,
                  });
                }
              }
            }
            buildings.push({ layerIdx, x, w, h, windows });
            x += w + 2;
          }
        });

        // Sky stars — only above the rough silhouette horizon
        stars = [];
        const skyTop = 0;
        const skyBottom = cv.height - 240; // above tallest mid-layer
        const starCount = Math.floor(cv.width * cv.height / 8000);
        for (let i = 0; i < starCount; i++) {
          stars.push({
            x: Math.random() * cv.width,
            y: skyTop + Math.random() * (skyBottom - skyTop),
            size: Math.random() < 0.85 ? 1 : 2,
            phase: Math.random() * Math.PI * 2,
            speed: 0.5 + Math.random() * 1.5,
          });
        }
      }

      function resize() {
        cv.width = window.innerWidth;
        cv.height = window.innerHeight;
        regen();
      }
      resize();
      window.addEventListener("resize", resize);
      window.addEventListener("orientationchange", resize);

      function step(t) {
        // Cozy night sky — deep indigo at top, warmer purple-pink near
        // horizon (city glow). Subtle green tint at the very bottom ties
        // back to the matrix theme.
        const grad = ctx.createLinearGradient(0, 0, 0, cv.height);
        grad.addColorStop(0, "#040518");
        grad.addColorStop(0.4, "#0d0e2e");
        grad.addColorStop(0.75, "#1f1238");
        grad.addColorStop(1, "#2a1535");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, cv.width, cv.height);

        // Stars — small twinkling dots in the upper sky
        for (const s of stars) {
          const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(t * 0.001 * s.speed + s.phase));
          ctx.fillStyle = `rgba(255, 255, 220, ${twinkle * 0.9})`;
          ctx.fillRect(s.x, s.y, s.size, s.size);
        }

        // Subtle horizon glow band
        const glow = ctx.createLinearGradient(0, cv.height * 0.65, 0, cv.height);
        glow.addColorStop(0, "rgba(255, 150, 50, 0)");
        glow.addColorStop(1, "rgba(255, 150, 50, 0.08)");
        ctx.fillStyle = glow;
        ctx.fillRect(0, cv.height * 0.65, cv.width, cv.height * 0.35);

        for (const b of buildings) {
          const layer = LAYERS[b.layerIdx];
          const offset = (t * layer.speed) % (cv.width + 100);
          const drawX = b.x - offset;
          if (drawX + b.w < 0 || drawX > cv.width) continue;

          const drawY = cv.height - b.h;

          ctx.fillStyle = layer.color;
          ctx.fillRect(drawX, drawY, b.w, b.h);

          for (const win of b.windows) {
            const flicker = 0.5 + 0.5 * Math.sin(t * 0.002 * win.speed + win.phase);
            if (flicker > 0.3) {
              const alpha = layer.windowAlpha * flicker;
              ctx.fillStyle = win.warm
                ? `rgba(255, 200, 90, ${alpha})`     // warm yellow window
                : `rgba(120, 255, 140, ${alpha})`;   // greenish window
              ctx.fillRect(drawX + win.x, drawY + win.y, 4, 6);
            }
          }
        }

        requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    })();
  </script>

  <!-- kaplay VN ──────────────────────────────────────────────────────── -->
  <script type="module">
    import kaplay from "https://unpkg.com/kaplay@3001.0.18/dist/kaplay.mjs";

    const k = kaplay({
      // Transparent so the matrix-rain canvas shows through
      background: [0, 9, 16, 0],
      width: 640,
      height: 480,
      buttons: { next: { keyboard: "space", mouse: "left" } },
      font: "happy",
      root: document.getElementById("wrap"),
      letterbox: true,
      crisp: true,
    });

    const {
      loadSprite, loadSound, loadBitmapFont, add, rect, anchor, pos, outline,
      text, sprite, scale, center, width, height, onButtonPress, loop, play,
      onLoad, onLoading, drawRect, drawText, vec2, wave, time, Color, color, rgb,
    } = k;

    const GREEN = Color.fromHex("#33ff00");
    const DARK = Color.fromHex("#000910");
    const GREEN_DIM = Color.fromHex("#0a3a00");

    // ── Matrix-style loading screen ──────────────────────────────────
    // Overrides kaplay's default loading bar. Drawn each frame during
    // asset loading. Uses kaplay's default font (the bitmap "happy" font
    // isn't loaded yet at this point).
    onLoading((progress) => {
      drawRect({
        width: width(),
        height: height(),
        color: DARK,
      });

      const barW = Math.min(width() * 0.7, 420);
      const barH = 18;
      const x = (width() - barW) / 2;
      const y = height() / 2;

      // Bar frame
      drawRect({
        pos: vec2(x, y),
        width: barW,
        height: barH,
        color: DARK,
        outline: { color: GREEN, width: 2 },
      });

      // Bar fill
      drawRect({
        pos: vec2(x, y),
        width: barW * progress,
        height: barH,
        color: GREEN,
      });

      // Caption above bar
      drawText({
        text: "LOADING " + Math.floor(progress * 100) + "%",
        pos: vec2(width() / 2, y - 40),
        size: 28,
        anchor: "center",
        color: GREEN,
      });
    });

    // Profile photo from blog.terrydjony.com — pre-cropped to a circular
    // PNG with transparent corners (via ImageMagick) so it renders as a
    // clean circle in kaplay without a shader.
    loadSprite("terry", "assets/sprites/terry.png");
    loadSound("terry_voice", "assets/sounds/bean_voice.wav");
    loadSound("music", "assets/sounds/moment-of-peace.mp3");
    loadBitmapFont("happy", "assets/fonts/happy_28x36.png", 28, 36);

    // ── Dialog beats ─────────────────────────────────────────────────
    // Kept intentionally short (4 beats) so the link grid is only a
    // handful of taps away.
    const dialogs = [
      "[default]Hi, I'm[/default] [name]Terry Djony[/name][default], a tech entrepreneur.[/default]",
      "[default]I build stuff on the internet.[/default]",
      // Stars beat — starts as a "..." placeholder; live count is patched
      // in below once the GitHub fetch resolves.
      "[default]GitHub total stars:[/default] [yc]★ ...[/yc]",
      "[yc]YC W21[/yc] [default]alum.[/default]",
    ];
    const STARS_BEAT_INDEX = 2;

    // ── Live GitHub stars (matches the original site's /repos fetch) ──
    // Updates dialog beat #2 in place once the fetch resolves. Stays
    // silent on failure — the "..." placeholder remains visible.
    fetch("https://api.github.com/users/terryds/repos?per_page=100")
      .then((r) => r.json())
      .then((repos) => {
        if (!Array.isArray(repos)) return;
        const total = repos.reduce(
          (s, r) => s + ((r && r.stargazers_count) || 0),
          0
        );
        dialogs[STARS_BEAT_INDEX] =
          `[default]GitHub total stars:[/default] [yc]★ ${total}[/yc]`;
      })
      .catch(() => {
        // leave the placeholder
      });

    let curDialog = 0;
    let isTalking = false;
    let atEnd = false;

    // Textbox: dark fill, green outline (matches the CRT look)
    const textbox = add([
      rect(width() - 80, 140, { radius: 4 }),
      anchor("center"),
      pos(center().x, height() - 100),
      color(DARK),
      outline(4, GREEN),
    ]);

    const txt = add([
      text("", {
        size: 28,
        width: width() - 130,
        align: "center",
        styles: {
          default: { color: GREEN },
          name: (idx) => ({
            color: Color.fromHex("#9bff7a"),
            pos: vec2(0, wave(-3, 3, time() * 5 + idx * 0.4)),
          }),
          yc: (idx) => ({
            color: Color.fromHex("#ff8a00"),
            scale: wave(1, 1.15, time() * 2 + idx * 0.3),
          }),
          hot: (idx) => ({
            color: Color.fromHex("#ff3855"),
            scale: wave(1, 1.2, time() * 3 + idx),
            angle: wave(-6, 6, time() * 3 + idx),
          }),
          ai: (idx) => ({
            color: Color.fromHex("#62e1ff"),
            pos: vec2(0, wave(-4, 4, time() * 4 + idx * 0.6)),
            angle: wave(-4, 4, time() * 2 + idx),
          }),
        },
        transform: (idx) => ({ opacity: idx < txt.letterCount ? 1 : 0 }),
      }),
      pos(textbox.pos),
      anchor("center"),
      { letterCount: 0 },
    ]);

    // 400x400 photo (circular-cropped via ImageMagick at build time) →
    // scale 0.35 ≈ 140px tall, fits the avatar slot above the textbox.
    const avatar = add([
      sprite("terry"),
      scale(0.35),
      anchor("center"),
      pos(center().sub(0, 60)),
    ]);

    onButtonPress("next", () => {
      if (isTalking) return;
      if (atEnd) return;
      curDialog++;
      if (curDialog >= dialogs.length) {
        atEnd = true;
        showLinks();
        return;
      }
      updateDialog();
    });

    function updateDialog() {
      startWriting(dialogs[curDialog]);
    }

    function strippedLength(s) {
      return s.replace(/\[\/?[a-z]+\]/g, "").length;
    }

    function startWriting(dialog) {
      isTalking = true;
      txt.letterCount = 0;
      txt.text = dialog;
      const len = strippedLength(dialog);
      const writing = loop(0.04, () => {
        txt.letterCount = Math.min(txt.letterCount + 1, len);
        play("terry_voice", { volume: 0.18 });
        if (txt.letterCount == len) {
          isTalking = false;
          writing.cancel();
        }
      });
    }

    // ── Final scene: show the HTML link grid (outside the canvas) ───────
    // We use HTML <a> tags rather than in-canvas buttons so taps land
    // natively without going through kaplay's pointer-coordinate
    // translation (which was hitting wrong spots on mobile, probably
    // due to the canvas vs viewport scaling).
    let musicHandle = null;

    function showLinks() {
      txt.text = "[default]choose your destination[/default]";
      txt.letterCount = 999;
      const grid = document.getElementById("link-grid");
      if (grid) grid.classList.add("show");
      document.body.classList.add("show-links");

      // Kick off the looping background music. play() returns a handle we
      // could pause/stop later (e.g. a mute button); kept on a let in
      // case we add that. iOS autoplay rules are satisfied here because
      // this call chain originated from a tap on the kaplay canvas.
      if (!musicHandle) {
        musicHandle = play("music", { loop: true, volume: 0.35 });
      }
    }

    onLoad(() => updateDialog());
  </script>
</body>
</html>
